name: linkit
arch: ${NFPM_ARCH}
platform: linux
version: ${PACKAGE_VERSION}
version_schema: semver
release: ${PACKAGE_RELEASE}
section: utils
priority: optional
maintainer: Blue Idea <blue-idea@users.noreply.github.com>
description: |
  Linkit is a desktop app for collecting, organizing, discovering, and reusing bookmarks.
homepage: https://github.com/blue-idea/collection
license: Proprietary

depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
  - xdg-utils

contents:
  - src: ./build/bin/linkit
    dst: /usr/bin/linkit
    file_info:
      mode: 0755
  - src: ./build/linux/linkit.desktop
    dst: /usr/share/applications/linkit.desktop
    file_info:
      mode: 0644
  - src: ./build/appicon.png
    dst: /usr/share/icons/hicolor/256x256/apps/linkit.png
    file_info:
      mode: 0644
