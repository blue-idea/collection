name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  PNPM_VERSION: '10.33.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Verify quality configuration
        run: pnpm --dir ui verify:quality-config

      - name: Audit Node dependencies
        run: pnpm --dir ui audit --audit-level high

      - name: Frontend lint
        run: pnpm --dir ui lint

      - name: Frontend typecheck
        run: pnpm --dir ui typecheck

      - name: Frontend unit tests
        run: pnpm --dir ui test --run

      - name: Frontend coverage report
        run: pnpm --dir ui test:coverage

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

      - name: Go tests (dev identity)
        run: go test -tags=dev ./config

      - name: Frontend build
        run: pnpm --dir ui build

      - name: Install Playwright browsers
        run: pnpm --dir ui exec playwright install --with-deps chromium

      - name: Playwright test list
        run: pnpm --dir ui exec playwright test --list

      - name: Verify E2E impact selector
        run: pnpm --dir ui test:e2e:impact:test

      - name: Select affected E2E tests
        if: github.event_name == 'pull_request'
        id: e2e-impact
        run: pnpm --dir ui test:e2e:impact -- --base "origin/${{ github.base_ref }}"

      - name: Playwright affected E2E tests
        if: github.event_name == 'pull_request'
        run: pnpm --dir ui exec playwright test ${{ steps.e2e-impact.outputs.e2e }}

      - name: Playwright affected visual tests
        if: github.event_name == 'pull_request' && steps.e2e-impact.outputs.visual != ''
        run: pnpm --dir ui exec playwright test ${{ steps.e2e-impact.outputs.visual }}

      - name: Playwright full E2E and visual tests
        if: github.event_name == 'push'
        run: pnpm --dir ui exec playwright test tests/e2e tests/visual
