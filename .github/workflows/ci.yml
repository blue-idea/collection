name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: '1.26'
  PNPM_VERSION: '10.33.0'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # golang.design/x/hotkey 在 Linux 上链接 hotkey/platform 测试二进制需要 -lX11
      - name: Install Linux X11 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Verify quality configuration
        run: pnpm --dir ui verify:quality-config

      - name: Audit Node dependencies
        run: pnpm --dir ui audit --audit-level high

      - name: Frontend lint
        run: pnpm --dir ui lint

      - name: Frontend typecheck
        run: pnpm --dir ui typecheck

      - name: Frontend unit tests
        run: pnpm --dir ui test --run

      - name: Frontend coverage report
        run: pnpm --dir ui test:coverage

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

      - name: Go tests (dev identity)
        run: go test -tags=dev ./config

      - name: Frontend build
        run: pnpm --dir ui build

      - name: Install Playwright browsers
        run: pnpm --dir ui exec playwright install --with-deps chromium

      - name: Playwright test list
        run: pnpm --dir ui exec playwright test --list

      - name: Playwright smoke tests
        run: pnpm --dir ui test:e2e
