name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: false

permissions:
  contents: write

env:
  GO_VERSION: '1.26'
  PNPM_VERSION: '10.33.0'
  WAILS_VERSION: v2.13.0
  NFPM_VERSION: v2.47.0

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            os: linux
            deb_arch: amd64
          - runner: windows-latest
            platform: windows/amd64
            os: windows
          - runner: macos-latest
            platform: darwin/universal
            os: macos

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Release Tag
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Install Linux build dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          # golang.design/x/hotkey 在生成 bindings 时需可连接的 X11 显示（无头 CI 用 xvfb）
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev xdg-utils xvfb

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir ui install --frozen-lockfile

      - name: Assert release identity (no dev tag)
        shell: bash
        run: |
          go test ./config -run 'TestReleaseIdentitySlot|TestIdentityIsolationInvariants' -count=1
          out="$(go run ./scripts/check-identity)"
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -qx 'profile=release'
          printf '%s\n' "$out" | grep -qx 'secretService=Linkit'
          printf '%s\n' "$out" | grep -qx 'title=Linkit'
          if printf '%s\n' "$out" | grep -q 'Linkit-Dev'; then
            echo "Release identity must not use Linkit-Dev" >&2
            exit 1
          fi

      - name: Build frontend
        run: pnpm --dir ui build

      - name: Install nFPM
        if: matrix.os == 'linux'
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}

      - name: Build Wails desktop app (Linux)
        if: matrix.os == 'linux'
        run: xvfb-run -a go run github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }} build -clean -platform ${{ matrix.platform }} -tags webkit2_41

      - name: Install NSIS (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          if (-not (Test-Path (Join-Path $nsisDir 'makensis.exe'))) {
            throw "makensis.exe not found under $nsisDir"
          }
          # 确保后续步骤与 wails -nsis 能找到 makensis
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
          & (Join-Path $nsisDir 'makensis.exe') /VERSION

      - name: Build Wails desktop app (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $nsisDir = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path $nsisDir) {
            $env:Path = "$nsisDir;$env:Path"
          }
          go run github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }} build -clean -platform ${{ matrix.platform }} -nsis
          if (-not (Test-Path 'build/bin/linkit-amd64-installer.exe')) {
            Get-ChildItem build/bin -ErrorAction SilentlyContinue | Format-Table Name,Length
            throw 'NSIS installer was not produced'
          }

      - name: Install create-dmg (macOS)
        if: matrix.os == 'macos'
        run: brew install create-dmg

      - name: Build Wails desktop app (macOS)
        if: matrix.os == 'macos'
        run: go run github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }} build -clean -platform ${{ matrix.platform }}

      - name: Build DMG (macOS)
        if: matrix.os == 'macos'
        run: |
          create-dmg \
            --volname "Linkit" \
            --window-size 600 400 \
            --app-drop-link 400 200 \
            "build/bin/Linkit.dmg" \
            "build/bin/Linkit.app"

      - name: Copy architecture-specific binary (Linux)
        if: matrix.os == 'linux'
        run: cp build/bin/linkit build/bin/linkit-${{ matrix.deb_arch }}

      - name: Build Debian package (Linux)
        if: matrix.os == 'linux'
        env:
          NFPM_ARCH: ${{ matrix.deb_arch }}
          PACKAGE_VERSION: ${{ env.RELEASE_TAG }}
          PACKAGE_RELEASE: '1'
        run: nfpm pkg --packager deb --target build/bin/linkit_${{ env.RELEASE_TAG }}_${{ matrix.deb_arch }}.deb

      - name: Verify release artifacts (Linux)
        if: matrix.os == 'linux'
        run: |
          test -x "build/bin/linkit-${{ matrix.deb_arch }}"
          test -f "build/bin/linkit_${{ env.RELEASE_TAG }}_${{ matrix.deb_arch }}.deb"
          if grep -aF "Linkit-Dev" "build/bin/linkit-${{ matrix.deb_arch }}"; then
            echo "Release binary must not embed Linkit-Dev" >&2
            exit 1
          fi

      - name: Verify release artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "build/bin/linkit-amd64-installer.exe")) { throw "Installer not found" }
          $exe = "build/bin/linkit.exe"
          if (-not (Test-Path $exe)) { throw "linkit.exe not found" }
          $ascii = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes($exe))
          if ($ascii.Contains("Linkit-Dev")) { throw "Release binary must not embed Linkit-Dev" }

      - name: Verify release artifacts (macOS)
        if: matrix.os == 'macos'
        run: |
          test -f "build/bin/Linkit.dmg"
          binary="$(find build/bin/Linkit.app/Contents/MacOS -type f -perm -111 | head -n 1)"
          test -n "$binary"
          if grep -aF "Linkit-Dev" "$binary"; then
            echo "Release binary must not embed Linkit-Dev" >&2
            exit 1
          fi

      - name: Upload Linux artifacts
        if: matrix.os == 'linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1 || gh release create "${{ env.RELEASE_TAG }}" --target "$GITHUB_SHA" --generate-notes || true
          gh release upload "${{ env.RELEASE_TAG }}" build/bin/linkit-${{ matrix.deb_arch }} build/bin/linkit_${{ env.RELEASE_TAG }}_${{ matrix.deb_arch }}.deb --clobber

      - name: Upload Windows artifacts
        if: matrix.os == 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1 || gh release create "${{ env.RELEASE_TAG }}" --target "$GITHUB_SHA" --generate-notes || true
          cp build/bin/linkit.exe build/bin/linkit-windows-amd64.exe
          gh release upload "${{ env.RELEASE_TAG }}" build/bin/linkit-amd64-installer.exe build/bin/linkit-windows-amd64.exe --clobber

      - name: Upload macOS artifacts
        if: matrix.os == 'macos'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1 || gh release create "${{ env.RELEASE_TAG }}" --target "$GITHUB_SHA" --generate-notes || true
          gh release upload "${{ env.RELEASE_TAG }}" build/bin/Linkit.dmg --clobber
